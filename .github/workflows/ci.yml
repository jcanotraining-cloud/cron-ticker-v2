name: CI Pipeline 

on:
    push:
        branches: [ main]
    pull_request:
        branches: [ main]
    workflow_dispatch: 

jobs:
    run-tests:
        name: Run Tests #Run test cualquier nombre
        runs-on: ubuntu-latest #Corriendo en ubuntu 

        #Crear los pasos de forma secuencial, dependencias
        steps:
            - name: Checkout code
                uses: actions/checkout@v4
            
            - name: Setup Node.js 20
                uses: actions/setup-node@v4
                with:
                    node-version: '22.21.1'
            
            - name: Install Dependencies
                run: npm ci #realiza una instalación limpia de npm

            - name: Run Test
                run: npm run test #o también npm test
