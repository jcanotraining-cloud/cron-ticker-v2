name: CI Pipeline 

on:
    push:
        branches: [ main]
    pull_request:
        branches: [ main]
    workflow_dispatch: 

env: #variables globales
  NODE_VERSION: "22.21.1"
  APP_NAME: cron-ticket-v2


jobs:
  build:
    runs-on: ubuntu-latest
  
    env: #Job build
      BUILD_DIR: dist
    
    steps:
      - uses: actions/checkout@v4

      - name: Show variables
        run: |
          echo "App: ${{env.APP_NAME}}, Node ${{env.NODE_VERSION}}"
      
      - name: Build
        run: npm run build
        env:
          APP_VERSION: "3"

