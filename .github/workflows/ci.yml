name: CI Pipeline Completo

on:
    push:
        branches: [ main]
    pull_request:
        branches: [ main]
    workflow_dispatch: 

env:
  NODE_VERSION: '20'

jobs:

  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  test:
    name: 🧪 Tests + Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci
      - run: npm run test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ github.sha }}
          path: coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    env: 
      BUILD_DIR: dist

    steps:
      - uses: actions/checkout@v4

      - name: Show local Variables
        run: |
          echo "NODE_VERSION: ${{ env.NODE_VERSION }}"
          echo "BUILD_DIR: ${{ env.BUILD_DIR }}"

      - name: Show github secrets
        run: |
          echo "API_KEY: ${{ secrets.API_KEY }}"

      - name: Show github functions
        run: |
          echo "API_KEY: ${{ toJSON(github) }}"

      - run: npm ci

      - name: Build
        run: npm run build

        env:
          APP_VERSION: "3.0.0"

  summary:
    name: ✅ Summary
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: always()
    steps:
      - name: Pipeline result
        run: |
          echo '================================='
          echo '  PIPELINE SUMMARY'
          echo '================================='
          echo '  Lint:  ${{ needs.lint.result }}'
          echo '  Test:  ${{ needs.test.result }}'
          echo '  Build: ${{ needs.build.result }}'
          echo '================================='
          echo '  Commit: ${{ github.sha }}'
          echo '  Branch: ${{ github.ref_name }}'
          echo '  Actor:  ${{ github.actor }}'
          echo '================================='
